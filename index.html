<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:linear-gradient(to bottom right,#000000,#111111,#000000);
    min-height:100vh;
    overflow-x:hidden;
    color:white;
}

/* PASSWORD SCREEN */

#passwordScreen{
    width:100%;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.passwordBox{
    width:90%;
    max-width:400px;
    background:rgba(255,255,255,0.1);
    padding:40px 20px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 0 30px cyan;
}

.passwordBox h1{
    color:cyan;
    font-size:50px;
    margin-bottom:20px;
    text-shadow:0 0 20px cyan;
}

.passwordBox input{
    width:100%;
    padding:18px;
    border:none;
    border-radius:15px;
    font-size:25px;
    text-align:center;
    margin-top:20px;
}

.passwordBox button{
    margin-top:25px;
    padding:15px 40px;
    border:none;
    border-radius:15px;
    background:cyan;
    color:black;
    font-size:20px;
    font-weight:bold;
}

/* MAIN CONTENT */

#mainContent{
    display:none;
    padding:20px;
    text-align:center;
}

/* HAPPY BIRTHDAY TEXT */

.neonText{
    font-size:60px;
    margin-top:20px;
    color:#ffccff;
    text-shadow:
    0 0 10px #ff00ff,
    0 0 20px #ff00ff,
    0 0 40px #00ffff;
    animation:glow 2s infinite alternate;
}

@keyframes glow{
    from{
        opacity:0.7;
    }
    to{
        opacity:1;
    }
}

/* MUSIC BUTTON */

.musicBox{
    margin-top:20px;
    margin-bottom:20px;
}

#playBtn{
    width:90px;
    height:90px;
    border:none;
    border-radius:50%;
    font-size:45px;
    background:white;
    box-shadow:0 0 25px #ff0080;
}

.musicBox p{
    margin-top:10px;
    font-size:18px;
    color:white;
}

/* IMAGE */

#photo{
    width:90%;
    max-width:500px;
    height:600px;
    object-fit:cover;
    border-radius:30px;
    margin-top:20px;
    box-shadow:0 0 30px cyan;
    animation:fade 2s infinite alternate;
}

@keyframes fade{
    from{
        opacity:0.7;
        transform:scale(0.97);
    }
    to{
        opacity:1;
        transform:scale(1);
    }
}

/* POETRY */

#poetry{
    margin-top:40px;
    font-size:35px;
    line-height:60px;
    color:white;
    padding:20px;
}

</style>
</head>

<body>

<!-- PASSWORD SCREEN -->

<div id="passwordScreen">

<div class="passwordBox">

<h1>🎂 Enter Password 🎂</h1>

<input type="password" id="passwordInput" placeholder="Enter Password">

<button onclick="checkPassword()">Open Surprise</button>

</div>

</div>

<!-- MAIN CONTENT -->

<div id="mainContent">

<!-- MUSIC -->

<audio id="bgMusic" loop>
<source src="husn.mp3.webm" type="audio/webm">
</audio>

<!-- HAPPY BIRTHDAY -->

<h1 class="neonText">
🎂 Happy Birthday 🎂
</h1>

<!-- PLAY BUTTON -->

<div class="musicBox">

<button id="playBtn">💋</button>

<p>Click on this 💋 to play the song</p>

</div>

<!-- IMAGE -->

<img id="photo" src="1.jpg">

<!-- POETRY -->

<div id="poetry"></div>

</div>

<script>

/* PASSWORD */

function checkPassword(){

let pass=document.getElementById("passwordInput").value;

if(pass==="3690"){

document.getElementById("passwordScreen").style.display="none";

document.getElementById("mainContent").style.display="block";

}else{

alert("Wrong Password");

}

}

/* MUSIC */

const music=document.getElementById("bgMusic");

document.getElementById("playBtn").addEventListener("click",()=>{

music.play();

});

/* IMAGES */

const images=[
"1.jpg",
"2.jpg",
"3.jpg",
"4.jpg",
"5.jpg",
"6.jpg",
"7.jpg",
"8.jpg",
"9.jpg",
"10.jpg"
];

let imgIndex=0;

setInterval(()=>{

imgIndex++;

if(imgIndex>=images.length){

imgIndex=0;

}

document.getElementById("photo").src=images[imgIndex];

},3000);

/* POETRY */

const poetryLines=[

"عمدہ کیا ہے ؟ اس کا چہرہ",

"خوشیاں کیا ہے ؟ اس کا ہونا",

"مہشا کیا ہے ؟ اس کی باتیں",

"غم کیا ہے ؟ اس سے جدائی",

"خوشبو کیا ہے ؟ اس کی سانسیں",

"چاند کیا ہے ؟ اس کی آنکھیں",

"زندگی کیا ہے ؟ اس کی محبت"

];

let poetryIndex=0;

const poetry=document.getElementById("poetry");

function changePoetry(){

poetry.innerHTML=poetryLines[poetryIndex];

poetryIndex++;

if(poetryIndex>=poetryLines.length){

poetryIndex=0;

}

}

changePoetry();

setInterval(changePoetry,3000);

</script>

</body>
</html>
